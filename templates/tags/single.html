{% extends "base.html" %}

{% block content %}
  <h1>Tag: {{ term.name }}</h1>
  <ul class="article-list">
    {% for page in term.pages %}
      <li>
        <time datetime="{{ page.date }}">{{ page.date | date(format="%Y-%m-%d") }}</time>
        <a href="{{ page.permalink }}">{{ page.title }}</a>
      </li>
    {% endfor %}
  </ul>
{% endblock content %}
